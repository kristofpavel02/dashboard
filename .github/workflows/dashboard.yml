name: Denni dashboard

on:
  schedule:
    - cron: "20 2 * * 1-6"
    - cron: "20 5 * * 1-6"
  workflow_dispatch:

concurrency:
  group: dashboard-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace zavislosti
        run: pip install requests

      - name: Stazeni dat a generovani HTML
        run: python fetch_and_build.py

      - name: Commit a push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "Zadne zmeny, koncim."
            exit 0
          fi
          git commit -m "dashboard update"
          git pull --rebase --autostash origin main
          git push
